<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixel Garden</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RSVR6Y389R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RSVR6Y389R');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #141b11; }
  a { color: #a4d47a; }
  a:hover { color: #cdeea8; }
  @keyframes toastIn { from { transform: translateY(-10px); opacity: 0; } to { transform: none; opacity: 1; } }
  .wrap {
    min-height: 100vh; background: #141b11; color: #d8e6c6;
    font-family: 'VT323', monospace; display: flex; flex-direction: column;
    align-items: center; gap: 18px; padding: 32px 16px 56px; box-sizing: border-box;
  }
  .head { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .head h1 {
    margin: 0; font-family: 'Press Start 2P', monospace; font-size: 22px;
    color: #a4d47a; letter-spacing: 2px; text-shadow: 0 3px 0 #0b110a;
  }
  .head p { margin: 0; font-size: 19px; color: #7f9468; }
  .toast {
    display: none; align-items: center; gap: 14px; background: #2a3a22;
    border: 3px solid #5d7a44; padding: 10px 16px; font-size: 19px;
    color: #d8e6c6; animation: toastIn 0.35s ease-out;
  }
  .toast.show { display: flex; }
  .toast button {
    font-family: 'Press Start 2P', monospace; font-size: 10px; background: #5d7a44;
    color: #141b11; border: none; padding: 8px 12px; cursor: pointer;
  }
  .bar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .coins { display: flex; align-items: center; gap: 8px; background: #232e1c; border: 3px solid #3a4a2c; padding: 8px 14px; }
  .coins .pip { width: 14px; height: 14px; background: #e8c84a; box-shadow: inset -3px -3px 0 #b3922a; }
  .coins .num { font-family: 'Press Start 2P', monospace; font-size: 14px; color: #e8c84a; }
  .fast { display: none; background: #232e1c; border: 3px solid #3a4a2c; padding: 8px 14px; font-size: 18px; color: #e0a04a; }
  .fast.show { display: block; }
  .seeds { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 780px; }
  .seedBtn {
    display: flex; align-items: center; gap: 10px;
    font-family: 'VT323', monospace; color: #d8e6c6;
    background: #232e1c; border: 3px solid #3a4a2c;
    padding: 8px 12px; cursor: pointer; text-align: left;
  }
  .seedBtn.sel { background: #33422a; border-color: #a4d47a; }
  .seedBtn.broke { opacity: 0.45; }
  .seedBtn .swatch { width: 18px; height: 18px; flex-shrink: 0; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3); }
  .seedBtn .col { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .seedBtn .nm { font-family: 'Press Start 2P', monospace; font-size: 9px; }
  .seedBtn .info { font-size: 16px; opacity: 0.75; }
  canvas {
    width: 100%; max-width: 740px; image-rendering: pixelated; background: #1c2515;
    border: 4px solid #3a4a2c; cursor: pointer; display: block; box-sizing: border-box;
  }
  .hint { margin: 0; font-size: 18px; color: #5f7050; text-align: center; max-width: 620px; }
  #tip {
    display: none; position: fixed; background: #0b110a; border: 2px solid #5d7a44;
    color: #d8e6c6; font-family: 'VT323', monospace; font-size: 18px;
    padding: 4px 10px; pointer-events: none; z-index: 50; white-space: nowrap;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>PIXEL GARDEN</h1>
    <p>plants keep growing in real time &mdash; even with the tab closed</p>
  </div>

  <div class="toast" id="awayToast">
    <span id="awayMsg"></span>
    <button id="awayOk" type="button">OK</button>
  </div>

  <div class="bar">
    <div class="coins"><span class="pip"></span><span class="num" id="coins">20</span></div>
    <div class="fast" id="fastBadge"></div>
  </div>

  <div class="seeds" id="seeds"></div>

  <canvas id="garden" width="740" height="360"></canvas>

  <p class="hint">click a plot to plant &middot; blooms pay out when harvested &middot; leave a bloom too long and weeds move in &middot; your garden is saved automatically</p>
</div>
<div id="tip"></div>

<script>
(function () {
  'use strict';

  var KEY = 'pixelGardenSave_v1';
  var COLS = 7, ROWS = 3, CELLW = 100, CELLH = 112, OX = 20, OY = 12, PX = 6;

  // Time-lapse multiplier for testing: open the page with ?speed=60 etc. (1–600)
  var SPEED = (function () {
    var m = /[?&]speed=(\d+)/.exec(location.search);
    var s = m ? Number(m[1]) : 1;
    return (isFinite(s) && s >= 1 && s <= 600) ? s : 1;
  })();
  var WEEDS = true;

  var SP = [
    { id: 'daisy', name: 'DAISY', cost: 5, yld: 14, bloomMin: 2, time: '2 MIN', f: '#f2f0e4', c: '#e8c84a' },
    { id: 'tulip', name: 'TULIP', cost: 12, yld: 34, bloomMin: 15, time: '15 MIN', f: '#e0575b', c: '#f0a3a5' },
    { id: 'rose', name: 'ROSE', cost: 30, yld: 90, bloomMin: 60, time: '1 HR', f: '#c94f6d', c: '#e88aa0' },
    { id: 'sunflower', name: 'SUNFLOWER', cost: 70, yld: 230, bloomMin: 360, time: '6 HR', f: '#e8c84a', c: '#7a5230' },
    { id: 'moonbloom', name: 'MOONBLOOM', cost: 160, yld: 600, bloomMin: 1440, time: '24 HR', f: '#cfd8f5', c: '#8ea4e8' }
  ];

  var MAPS = {
    seed: [
      '............','............','............','............',
      '............','............','............','............',
      '.....oo.....','....o..o....','.....oo.....','............'
    ],
    sprout: [
      '............','............','............','............',
      '............','............','......g.....','......g.....',
      '..ll..g.....','...ll.g.ll..','.....gg.ll..','......g.....'
    ],
    bud: [
      '............','............','............','.....FF.....',
      '....FFFF....','....dFFd....','.....gg.....','......g.....',
      '..ll..g.....','...ll.g.ll..','.....gg.ll..','......g.....'
    ],
    weed: [
      '............','............','..w....w....','..w.w..w..w.',
      '...ww.ww..w.','...w.ww..ww.','....www.ww..','..w..wwww...',
      '...ww.ww....','..w.www.w...','....ww.w....','...wwww.....'
    ],
    daisy: [
      '............','.....F......','...F...F....','....FCF.....',
      '..F.CCC.F...','....FCF.....','...F...F....','.....F......',
      '......g.....','..ll..g.....','...ll.g.ll..','......g.....'
    ],
    tulip: [
      '............','............','....F..F....','....FFFF....',
      '....FFFF....','....FCFF....','.....gg.....','......g.....',
      '..ll..g.....','...ll.g.ll..','.....gg.....','......g.....'
    ],
    rose: [
      '............','....FFF.....','...FCFFF....','...FFCFF....',
      '...FFFCF....','....FFF.....','......g.....','......g.....',
      '..ll..g.....','...ll.g.ll..','.....gg.....','......g.....'
    ],
    sunflower: [
      '....FFFF....','...FFFFFF...','..FFCCCCFF..','..FCCCCCCF..',
      '..FCCCCCCF..','..FFCCCCFF..','...FFFFFF...','....FFFF....',
      '......g.....','..ll..g.....','...ll.g.ll..','......g.....'
    ],
    moonbloom: [
      '.....C......','....CFC.....','...CFFFC....','..CFFFFFC...',
      '...CFFFC....','....CFC.....','.....C......','......g.....',
      '......g.....','..ll..g.....','...ll.g.ll..','......g.....'
    ]
  };

  var state = { coins: 20, plots: emptyPlots(), sel: 'daisy' };
  var storageOk = true;

  function emptyPlots() {
    var a = [];
    for (var i = 0; i < COLS * ROWS; i++) a.push(null);
    return a;
  }

  function track(eventName, params) {
    if (typeof window.gtag !== 'function') return;
    try { window.gtag('event', eventName, params || {}); } catch (err) {}
  }

  function sp(id) {
    for (var i = 0; i < SP.length; i++) if (SP[i].id === id) return SP[i];
    return SP[0];
  }

  function bloomMs(s) { return s.bloomMin * 60000 / SPEED; }

  function stageOf(plot, now) {
    var s = sp(plot.sp);
    var t = (now - plot.plantedAt) / bloomMs(s);
    if (t < 0.12) return { stage: 'seed', t: t };
    if (t < 0.5) return { stage: 'sprout', t: t };
    if (t < 1) return { stage: 'bud', t: t };
    if (!WEEDS || t < 3) return { stage: 'bloom', t: t };
    return { stage: 'weed', t: t };
  }

  // ---------- saving ----------

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify({
        coins: state.coins, plots: state.plots, sel: state.sel, lastVisit: Date.now()
      }));
      storageOk = true;
    } catch (err) {
      if (storageOk) console.warn('Pixel Garden: could not save progress —', err);
      storageOk = false;
    }
  }

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) return;
      var d = JSON.parse(raw);
      var plots = Array.isArray(d.plots) ? d.plots.slice(0, COLS * ROWS) : [];
      while (plots.length < COLS * ROWS) plots.push(null);
      state.coins = (typeof d.coins === 'number') ? d.coins : 20;
      state.plots = plots;
      state.sel = d.sel || 'daisy';
      showAway(awayReport(d.lastVisit, plots));
    } catch (err) {
      console.warn('Pixel Garden: could not load save —', err);
    }
  }

  function awayReport(lastVisit, plots) {
    if (!lastVisit) return null;
    var now = Date.now();
    if (now - lastVisit < 60000) return null;
    var bloomed = 0, overgrown = 0;
    plots.forEach(function (p) {
      if (!p) return;
      var bAt = p.plantedAt + bloomMs(sp(p.sp));
      var wAt = p.plantedAt + bloomMs(sp(p.sp)) * 3;
      if (bAt > lastVisit && bAt <= now) bloomed++;
      if (WEEDS && wAt > lastVisit && wAt <= now) { overgrown++; bloomed = Math.max(0, bloomed - 1); }
    });
    if (!bloomed && !overgrown) return null;
    var parts = [];
    if (bloomed) parts.push(bloomed + (bloomed === 1 ? ' FLOWER BLOOMED' : ' FLOWERS BLOOMED'));
    if (overgrown) parts.push(overgrown + ' OVERGROWN BY WEEDS');
    return 'WHILE YOU WERE AWAY: ' + parts.join(' · ');
  }

  // ---------- DOM ----------

  var cv = document.getElementById('garden');
  var ctx = cv.getContext('2d');
  var coinsEl = document.getElementById('coins');
  var seedsEl = document.getElementById('seeds');
  var tipEl = document.getElementById('tip');
  var toastEl = document.getElementById('awayToast');
  var awayMsgEl = document.getElementById('awayMsg');
  var fastEl = document.getElementById('fastBadge');

  document.getElementById('awayOk').addEventListener('click', function () {
    toastEl.classList.remove('show');
  });

  if (SPEED > 1) {
    fastEl.textContent = 'TIME-LAPSE ×' + SPEED;
    fastEl.classList.add('show');
  }

  function showAway(msg) {
    if (!msg) return;
    awayMsgEl.textContent = msg;
    toastEl.classList.add('show');
  }

  var seedBtns = [];
  SP.forEach(function (s) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'seedBtn';
    var sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = s.f;
    var col = document.createElement('span');
    col.className = 'col';
    var nm = document.createElement('span');
    nm.className = 'nm';
    nm.textContent = s.name;
    var info = document.createElement('span');
    info.className = 'info';
    info.textContent = s.cost + '¢ · ' + s.time;
    col.appendChild(nm); col.appendChild(info);
    btn.appendChild(sw); btn.appendChild(col);
    btn.addEventListener('click', function () {
      state.sel = s.id;
      renderUI();
      save();
      track('select_seed', { seed_name: s.id });
    });
    seedsEl.appendChild(btn);
    seedBtns.push({ id: s.id, cost: s.cost, el: btn });
  });

  function renderUI() {
    coinsEl.textContent = state.coins;
    seedBtns.forEach(function (b) {
      b.el.classList.toggle('sel', b.id === state.sel);
      b.el.classList.toggle('broke', state.coins < b.cost);
    });
  }

  // ---------- input ----------

  function plotAt(e) {
    var r = cv.getBoundingClientRect();
    var x = (e.clientX - r.left) * (cv.width / r.width);
    var y = (e.clientY - r.top) * (cv.height / r.height);
    var col = Math.floor((x - OX) / CELLW);
    var row = Math.floor((y - OY) / CELLH);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return -1;
    return row * COLS + col;
  }

  cv.addEventListener('click', function (e) {
    var i = plotAt(e);
    if (i < 0) return;
    var now = Date.now();
    var p = state.plots[i];
    if (!p) {
      var s = sp(state.sel);
      if (state.coins >= s.cost) {
        state.coins -= s.cost;
        state.plots[i] = { sp: s.id, plantedAt: now };
        track('plant_seed', { seed_name: s.id, cost: s.cost });
      }
    } else {
      var st = stageOf(p, now).stage;
      if (st === 'bloom') {
        var sb = sp(p.sp);
        state.coins += sb.yld;
        state.plots[i] = null;
        track('harvest_bloom', { seed_name: sb.id, coins_earned: sb.yld });
      } else if (st === 'weed') {
        state.coins += 2;
        state.plots[i] = null;
        track('clear_weed', { coins_earned: 2 });
      } else {
        return;
      }
    }
    var allEmpty = state.plots.every(function (x) { return x === null; });
    if (state.coins < 5 && allEmpty) state.coins = 5;
    hideTip();
    renderUI();
    save();
    draw();
  });

  var tip = null;
  function hideTip() { tip = null; tipEl.style.display = 'none'; }

  cv.addEventListener('mousemove', function (e) {
    var i = plotAt(e);
    var text = null;
    if (i >= 0) {
      var p = state.plots[i];
      if (!p) {
        var s = sp(state.sel);
        text = 'PLANT ' + s.name + ' (' + s.cost + '¢)';
      } else {
        var s2 = sp(p.sp);
        var r = stageOf(p, Date.now());
        if (r.stage === 'bloom') text = 'HARVEST ' + s2.name + ' (+' + s2.yld + '¢)';
        else if (r.stage === 'weed') text = 'OVERGROWN — CLICK TO CLEAR (+2¢)';
        else text = s2.name + ' — ' + Math.floor(Math.min(r.t, 1) * 100) + '% GROWN';
      }
    }
    if (!text) { hideTip(); return; }
    if (!tip || tip.text !== text || Math.abs(tip.x - e.clientX) > 6 || Math.abs(tip.y - e.clientY) > 6) {
      tip = { x: e.clientX, y: e.clientY, text: text };
      tipEl.textContent = text;
      tipEl.style.left = (e.clientX + 14) + 'px';
      tipEl.style.top = (e.clientY + 14) + 'px';
      tipEl.style.display = 'block';
    }
  });

  cv.addEventListener('mouseleave', hideTip);

  // ---------- drawing ----------

  function drawMap(map, legend, x, y) {
    for (var r = 0; r < map.length; r++) {
      var row = map[r];
      for (var c = 0; c < row.length; c++) {
        var col = legend[row[c]];
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x + c * PX, y + r * PX, PX, PX);
      }
    }
  }

  function draw() {
    ctx.imageSmoothingEnabled = false;
    var now = Date.now();
    ctx.fillStyle = '#1c2515';
    ctx.fillRect(0, 0, cv.width, cv.height);
    for (var i = 0; i < COLS * ROWS; i++) {
      var cx = OX + (i % COLS) * CELLW;
      var cy = OY + Math.floor(i / COLS) * CELLH;
      var soilTop = cy + CELLH - 28;
      ctx.fillStyle = '#2a1f16';
      ctx.fillRect(cx + 8, soilTop + 4, CELLW - 16, 20);
      ctx.fillStyle = '#3a2b1f';
      ctx.fillRect(cx + 8, soilTop, CELLW - 16, 20);
      ctx.fillStyle = '#4a3828';
      for (var k = 0; k < 5; k++) {
        var sx = cx + 14 + ((i * 37 + k * 23) % (CELLW - 30));
        var sy = soilTop + 4 + ((i * 13 + k * 7) % 12);
        ctx.fillRect(sx, sy, 3, 3);
      }
      var p = state.plots[i];
      var spriteX = cx + (CELLW - 12 * PX) / 2;
      var spriteY = soilTop + 8 - 12 * PX;
      if (!p) {
        ctx.fillStyle = 'rgba(216,230,198,0.10)';
        ctx.fillRect(cx + CELLW / 2 - 2, soilTop + 6, 4, 8);
        ctx.fillRect(cx + CELLW / 2 - 4, soilTop + 8, 8, 4);
        continue;
      }
      var s = sp(p.sp);
      var res = stageOf(p, now);
      var stage = res.stage, t = res.t;
      var legend = { g: '#4e8f3f', d: '#2f5f2f', l: '#7cbf58', o: '#c9a35c', w: '#6f8f3a', F: s.f, C: s.c };
      var map = (stage === 'bloom') ? MAPS[s.id] : MAPS[stage];
      drawMap(map, legend, spriteX, spriteY);
      if (stage === 'seed' || stage === 'sprout' || stage === 'bud') {
        var w = Math.floor((CELLW - 40) * Math.min(t, 1));
        ctx.fillStyle = '#141b11';
        ctx.fillRect(cx + 20, cy + CELLH - 4, CELLW - 40, 3);
        ctx.fillStyle = '#7cbf58';
        ctx.fillRect(cx + 20, cy + CELLH - 4, w, 3);
      }
      if (stage === 'bloom') {
        var ph = Math.floor(now / 350);
        for (var j = 0; j < 2; j++) {
          if ((ph + i + j * 2) % 4 === 0) {
            var tx = spriteX + ((i * 29 + j * 41) % 60) + 6;
            var ty = spriteY + ((i * 17 + j * 31) % 40);
            ctx.fillStyle = 'rgba(255,255,240,0.9)';
            ctx.fillRect(tx, ty, 3, 3);
          }
        }
      }
      if (stage === 'weed') {
        ctx.fillStyle = 'rgba(111,143,58,0.25)';
        ctx.fillRect(cx + 6, cy + 6, CELLW - 12, CELLH - 12);
      }
    }
    renderUI();
  }

  // ---------- boot ----------

  load();
  renderUI();
  draw();
  setInterval(draw, 250);
  setInterval(save, 5000);
  window.addEventListener('beforeunload', save);
  window.addEventListener('pagehide', save);
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') save();
  });
})();
</script>
</body>
</html>
